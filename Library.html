<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Read.ly - Librarian Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f5f5f0;
            display: flex;
            min-height: 100vh;
        }

        /* ---- SIDEBAR ---- */
        .sidebar {
            width: 185px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            padding: 22px 14px;
            border-right: 1px solid #e8e8e8;
            position: fixed;
            height: 100vh;
            top: 0;
            left: 0;
        }

        .logo-area { margin-bottom: 28px; }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 15px;
            color: #1a1a1a;
        }

        .logo-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #3d6b4a;
            border-radius: 50%;
        }

        .sidebar-userid {
            font-size: 11px;
            color: #aaa;
            margin-top: 3px;
            padding-left: 2px;
        }

        nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        nav a {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 11px;
            border-radius: 8px;
            text-decoration: none;
            color: #555;
            font-size: 13.5px;
            cursor: pointer;
            transition: background 0.12s;
        }

        nav a:hover { background: #f0f0eb; color: #222; }
        nav a.active { background: #3d6b4a; color: #fff; }

        .nav-icon { font-size: 14px; width: 17px; text-align: center; }

        .logout-btn {
            background: #3d6b4a;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            font-weight: 500;
        }

        .logout-btn:hover { background: #2f5438; }

        /* ---- MAIN ---- */
        .main {
            margin-left: 185px;
            flex: 1;
            padding: 28px 32px;
            min-height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 22px;
        }

        .top-bar .page-label {
            font-size: 13px;
            color: #999;
            font-weight: 400;
            margin-bottom: 5px;
        }

        .top-bar h1 {
            font-size: 27px;
            font-weight: 700;
            color: #111;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #c9b99a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #6b4f2e;
            font-size: 15px;
            flex-shrink: 0;
        }

        /* ---- STATS ---- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: #fff;
            border-radius: 10px;
            padding: 16px 17px;
            border: 1px solid #e8e8e8;
        }

        .stat-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 3px;
        }

        .stat-icon {
            background: #3d6b4a;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .stat-number { font-size: 22px; font-weight: 700; color: #111; }
        .stat-label { font-size: 12px; color: #999; margin-bottom: 13px; }

        .view-details-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12.5px;
            color: #666;
            cursor: pointer;
            border: none;
            background: none;
            font-family: 'DM Sans', sans-serif;
        }

        .view-details-link:hover { color: #3d6b4a; }

        /* ---- SECTION ---- */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 11px;
        }

        .section-header h3 { font-size: 16px; font-weight: 600; color: #111; }

        .view-all-link {
            font-size: 12.5px;
            color: #3d6b4a;
            cursor: pointer;
            border: none;
            background: none;
            font-family: 'DM Sans', sans-serif;
        }

        .view-all-link:hover { text-decoration: underline; }

        .btn-add-book {
            background: #3d6b4a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 7px;
            font-size: 13.5px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-add-book:hover { background: #2f5438; }

        /* ---- TABLE ---- */
        .book-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #e8e8e8;
            font-size: 13.5px;
        }

        .book-table thead tr { background: #3d6b4a; color: white; }

        .book-table th {
            padding: 11px 15px;
            text-align: left;
            font-weight: 500;
            font-size: 13px;
        }

        .book-table td {
            padding: 10px 15px;
            border-bottom: 1px solid #f0f0eb;
            color: #333;
        }

        .book-table tbody tr:last-child td { border-bottom: none; }
        .book-table tbody tr:hover { background: #fafaf7; }

        .action-btns { display: flex; gap: 6px; }

        .btn-edit {
            background: #4a90d9;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-del {
            background: #e05252;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-edit:hover { background: #3a7bc0; }
        .btn-del:hover { background: #c43c3c; }

        /* ---- EMPTY STATE ---- */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e8e8e8;
        }

        .empty-state svg { width: 180px; height: 180px; margin-bottom: 12px; }
        .empty-state p { font-size: 13.5px; color: #888; margin-bottom: 16px; line-height: 1.6; }

        /* ---- MODAL ---- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal-box {
            background: white;
            border-radius: 14px;
            padding: 28px 30px 24px;
            width: 460px;
            max-width: 95vw;
            position: relative;
        }

        .modal-box h3 { font-size: 19px; font-weight: 700; margin-bottom: 20px; color: #111; }

        .modal-close-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            background: #e05252;
            border: none;
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close-btn:hover { background: #c43c3c; }

        .form-group { margin-bottom: 13px; }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #333;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid #ddd;
            border-radius: 7px;
            font-size: 13.5px;
            font-family: 'DM Sans', sans-serif;
            color: #111;
            background: #fff;
        }

        .form-group input::placeholder { color: #bbb; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #3d6b4a; }

        .modal-footer {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 22px;
        }

        .btn-cancel {
            background: none;
            color: #444;
            border: none;
            padding: 9px 16px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
        }

        .btn-cancel:hover { text-decoration: underline; }

        .btn-save {
            background: #3d6b4a;
            color: white;
            border: none;
            padding: 9px 44px;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-save:hover { background: #2f5438; }

        /* ---- DISCARD POPUP ---- */
        .discard-popup-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .discard-popup-overlay.open { display: flex; }

        .discard-popup {
            background: white;
            border-radius: 14px;
            padding: 28px 24px 22px;
            width: 310px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.18);
            border: 2px solid #e0e0e0;
        }

        .discard-popup p { font-size: 14.5px; font-weight: 600; color: #222; margin-bottom: 18px; }

        .discard-popup-btns { display: flex; gap: 10px; justify-content: center; }

        .btn-keep {
            background: none;
            color: #555;
            border: none;
            padding: 9px 16px;
            font-size: 13.5px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            border-radius: 7px;
        }

        .btn-keep:hover { background: #f0f0eb; }

        .btn-discard {
            background: #c43c3c;
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13.5px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-discard:hover { background: #a82e2e; }

        /* ---- NOTIFICATION ---- */
        .notif {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 11px 18px;
            border-radius: 8px;
            font-size: 13.5px;
            color: white;
            z-index: 999;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
        }

        .notif.show { opacity: 1; transform: translateY(0); }
        .notif.success { background: #3d6b4a; }
        .notif.error { background: #e05252; }

        /* ---- VIEWS ---- */
        .view { display: none; }
        .view.active { display: block; }

        /* ---- FORM CARD (borrow/return) ---- */
        .form-card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e8e8e8;
            padding: 24px;
            max-width: 460px;
        }

        .btn-primary {
            background: #3d6b4a;
            color: white;
            border: none;
            padding: 9px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            font-weight: 500;
            margin-top: 6px;
        }

        .btn-primary:hover { background: #2f5438; }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-borrowed { background: #e6f2ea; color: #3d6b4a; }
        .badge-returned { background: #e8e8e8; color: #666; }
        .badge-overdue { background: #fdecea; color: #c43c3c; }

        .btn-return-sm {
            background: #3d6b4a;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12.5px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
        }

        .btn-return-sm:hover { background: #2f5438; }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo-area">
        <div class="logo-row"><span class="logo-dot"></span> Read.ly</div>
        <div class="sidebar-userid" id="sidebar-userid">LB0001</div>
    </div>
    <nav>
        <a onclick="showView('dashboard')" id="nav-dashboard" class="active">
            <span class="nav-icon">⊞</span> Dashboard
        </a>
        <a onclick="showView('manage-books')" id="nav-manage-books">
            <span class="nav-icon">⊞</span> Manage Books
        </a>
        <a onclick="showView('borrow-book')" id="nav-borrow-book">
            <span class="nav-icon">⊞</span> Borrow Book
        </a>
        <a onclick="showView('return-book')" id="nav-return-book">
            <span class="nav-icon">⊞</span> Return Book
        </a>
        <a onclick="showView('transactions')" id="nav-transactions">
            <span class="nav-icon">⊞</span> Transactions
        </a>
    </nav>
    <button class="logout-btn" onclick="handleLogout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">
    <div class="top-bar">
        <div>
            <div class="page-label" id="page-label">Dashboard</div>
            <h1 id="welcome-msg">Welcome back, Librarian!</h1>
        </div>
        <div class="avatar" id="avatar-initials">L</div>
    </div>

    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-top">
                    <div class="stat-icon">📚</div>
                    <div class="stat-number" id="stat-total">0</div>
                </div>
                <div class="stat-label">Total Books</div>
                <button class="view-details-link" onclick="showView('manage-books')">View Details →</button>
            </div>
            <div class="stat-card">
                <div class="stat-top">
                    <div class="stat-icon">✅</div>
                    <div class="stat-number" id="stat-available">0</div>
                </div>
                <div class="stat-label">Available Books</div>
                <button class="view-details-link" onclick="showView('manage-books')">View Details →</button>
            </div>
            <div class="stat-card">
                <div class="stat-top">
                    <div class="stat-icon">📖</div>
                    <div class="stat-number" id="stat-active">0</div>
                </div>
                <div class="stat-label">Active Borrows</div>
                <button class="view-details-link" onclick="showView('transactions')">View Details →</button>
            </div>
            <div class="stat-card">
                <div class="stat-top">
                    <div class="stat-icon">⚠️</div>
                    <div class="stat-number" id="stat-overdue">0</div>
                </div>
                <div class="stat-label">Overdue</div>
                <button class="view-details-link" onclick="showView('transactions')">View Details →</button>
            </div>
        </div>

        <div class="section-header">
            <h3>Book List</h3>
            <button class="view-all-link" onclick="showView('manage-books')">View All</button>
        </div>
        <div id="dashboard-book-area"></div>
    </div>

    <!-- MANAGE BOOKS -->
    <div class="view" id="view-manage-books">
        <div class="section-header">
            <h3>Book List</h3>
            <button class="btn-add-book" onclick="openAddBookModal()">+ Add Book</button>
        </div>
        <div id="manage-book-area"></div>
    </div>

    <!-- BORROW BOOK -->
    <div class="view" id="view-borrow-book">
        <div class="section-header"><h3>Borrow Book</h3></div>
        <div id="borrow-form-area"></div>
    </div>

    <!-- RETURN BOOK -->
    <div class="view" id="view-return-book">
        <div class="section-header"><h3>Return Book</h3></div>
        <div id="return-form-area"></div>
    </div>

    <!-- TRANSACTIONS -->
    <div class="view" id="view-transactions">
        <div class="section-header"><h3>Transactions</h3></div>
        <div id="transactions-area"></div>
    </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="book-modal">
    <div class="modal-box">
        <button class="modal-close-btn" onclick="tryCloseModal()">✕</button>
        <h3 id="modal-title">Edit Book</h3>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="book-title" placeholder="Book title">
        </div>
        <div class="form-group">
            <label>Author</label>
            <input type="text" id="book-author" placeholder="Author name">
        </div>
        <div class="form-group">
            <label>Category</label>
            <input type="text" id="book-category" placeholder="e.g. Programming">
        </div>
        <div class="form-group">
            <label>ISBN</label>
            <input type="text" id="book-isbn" placeholder="ISBN number">
        </div>
        <div class="form-group">
            <label>Total Copies</label>
            <input type="number" id="book-copies" placeholder="1" min="1">
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="tryCloseModal()">Cancel</button>
            <button class="btn-save" onclick="handleSaveBook()">Save</button>
        </div>
    </div>
</div>

<!-- DISCARD POPUP -->
<div class="discard-popup-overlay" id="discard-popup">
    <div class="discard-popup">
        <svg viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:130px;height:110px;margin-bottom:10px">
            <rect x="100" y="20" width="65" height="115" rx="4" fill="#deb887" stroke="#c4996b" stroke-width="2"/>
            <rect x="107" y="27" width="51" height="101" rx="3" fill="#cd9b5a"/>
            <circle cx="116" cy="78" r="4" fill="#8b6914"/>
            <rect x="97" y="16" width="71" height="8" rx="2" fill="#b07840"/>
            <rect x="72" y="118" width="20" height="17" rx="3" fill="#c4956a"/>
            <ellipse cx="75" cy="109" rx="8" ry="11" fill="#5a9e6a" transform="rotate(-20 75 109)"/>
            <ellipse cx="84" cy="107" rx="8" ry="11" fill="#4a8e5a" transform="rotate(15 84 107)"/>
            <ellipse cx="79" cy="104" rx="5" ry="10" fill="#6ab07a"/>
            <ellipse cx="62" cy="135" rx="16" ry="6" fill="#00000015"/>
            <rect x="55" y="108" width="10" height="28" rx="4" fill="#8b6bb1"/>
            <rect x="67" y="108" width="10" height="28" rx="4" fill="#8b6bb1"/>
            <ellipse cx="60" cy="136" rx="9" ry="4" fill="#333"/>
            <ellipse cx="72" cy="136" rx="9" ry="4" fill="#333"/>
            <rect x="50" y="80" width="32" height="32" rx="12" fill="#d4779a"/>
            <rect x="80" y="85" width="22" height="8" rx="4" fill="#f0b090" transform="rotate(-10 80 85)"/>
            <circle cx="103" cy="83" r="5" fill="#f0b090"/>
            <rect x="30" y="88" width="18" height="8" rx="4" fill="#f0b090" transform="rotate(20 30 88)"/>
            <circle cx="66" cy="68" r="14" fill="#f0b090"/>
            <ellipse cx="66" cy="58" rx="14" ry="8" fill="#5a3010"/>
            <ellipse cx="54" cy="68" rx="6" ry="10" fill="#5a3010"/>
            <ellipse cx="78" cy="65" rx="5" ry="9" fill="#5a3010"/>
            <ellipse cx="62" cy="69" rx="2" ry="2.5" fill="#333"/>
            <ellipse cx="70" cy="69" rx="2" ry="2.5" fill="#333"/>
            <path d="M61 75 Q66 79 71 75" stroke="#c07050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <text x="144" y="42" font-size="18" fill="#e05252" font-family="serif" font-weight="bold">?</text>
            <text x="158" y="30" font-size="13" fill="#e0a000" font-family="serif" font-weight="bold">?</text>
        </svg>
        <p>Are you sure you want to leave?</p>
        <div class="discard-popup-btns">
            <button class="btn-keep" onclick="closeDiscardPopup()">Keep Editing</button>
            <button class="btn-discard" onclick="confirmDiscard()">Discard Changes</button>
        </div>
    </div>
</div>
</body>
</html>
